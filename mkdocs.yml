site_name: YummyBait Docs
site_description: Public documentation for the YummyBait Telegram bot and webhook signal catalog.
site_url: https://yummybait-fin.github.io/yummybait-docs/
copyright: >
  &copy; YummyBait —
  <a href="https://github.com/Yummybait-fin/yummybait-docs" target="_blank" rel="noopener">source on GitHub</a>

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.png
  favicon: assets/favicon.ico
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra:
  homepage: https://yummybait.finance
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Yummybait-fin/yummybait-docs
      name: Source on GitHub

extra_css:
  - stylesheets/yummybait.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets

nav:
  - Home: index.md
  - Telegram Bot:
      - Overview: bot/index.md
      - Commands: bot/commands.md
      - Wallets: bot/wallets.md
      - Positions: bot/positions.md
      - AI Advice: bot/advice.md
      - Notifications: bot/notifications.md
      - Privacy & Data: bot/privacy.md
  - Webhook Signals:
      - Overview: webhooks/index.md
      - Subscribing: webhooks/subscribing.md
      - Payload Schema: webhooks/payload.md
      - Versioning: webhooks/versioning.md
  - Reference:
      - Metrics Catalog: reference/metrics-catalog.md
      - Glossary: reference/glossary.md
      - Changelog: reference/changelog.md
